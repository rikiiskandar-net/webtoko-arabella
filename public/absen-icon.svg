<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bgGrad)" />

  <!-- ID Card Container -->
  <rect x="14" y="14" width="36" height="36" rx="8" fill="#FFFFFF" fill-opacity="0.95" filter="url(#shadow)" />

  <!-- Card Top Lanyard / Badge Header -->
  <rect x="14" y="14" width="36" height="10" rx="2" fill="#4338CA" />
  <circle cx="32" cy="19" r="2" fill="#FFFFFF" />

  <!-- Profile / Fingerprint Avatar Silhouette -->
  <circle cx="25" cy="31" r="5" fill="#6366F1" />
  <path d="M19 43 C19 38, 31 38, 31 43" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round" fill="none" />

  <!-- Lines on Card -->
  <line x1="34" y1="28" x2="44" y2="28" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" />
  <line x1="34" y1="33" x2="42" y2="33" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" />

  <!-- Presence Verified Badge (Checkmark Circle) -->
  <circle cx="44" cy="42" r="8" fill="url(#badgeGrad)" stroke="#FFFFFF" stroke-width="2" />
  <path d="M40.5 42 L43 44.5 L47.5 39.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
